<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROW Application Assistant</title>
  <style>
    /* ===== RESET & BASE ===== */
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#003d5c;--primary-dark:#002a3f;--primary-light:#005f8a;
      --accent:#0078d4;--accent-hover:#106ebe;
      --green:#1a8f3c;--orange:#d4820a;--red:#c42b1c;
      --bg:#dce8f0;--card:#ffffff;--text:#1e2a36;--text-light:#5a6577;
      --border:#dce3ec;--shadow:0 8px 40px rgba(0,30,60,.12);
      --radius:18px;--radius-lg:22px;
    }
    html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }

    /* ===== LAYOUT ===== */
    .app{
      display:flex;flex-direction:column;
      width:740px;
      height:90vh;
      background:var(--card);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    /* ===== TOP BAR ===== */
    .topbar{
      height:72px;
      background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 40%,var(--primary-light) 100%);
      display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    }
    .topbar .bot-avatar{
      width:46px;height:46px;background:rgba(255,255,255,.15);border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
      border:2px solid rgba(255,255,255,.25);
    }
    .topbar .title-group{display:flex;flex-direction:column;gap:2px}
    .topbar .title{font-size:17px;font-weight:700;color:#fff;letter-spacing:.3px}
    .topbar .subtitle{font-size:12.5px;color:rgba(255,255,255,.7);font-weight:400}

    /* ===== CHAT AREA ===== */
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .chat-messages{
      flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px;
      scroll-behavior:smooth;background:#f4f7fa;
    }
    .chat-messages::-webkit-scrollbar{width:5px}
    .chat-messages::-webkit-scrollbar-thumb{background:#c5cdd8;border-radius:10px}

    /* ===== BUBBLES ===== */
    .msg{max-width:82%;animation:fadeUp .35s ease;width:fit-content}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot{align-self:flex-start}
    .msg.user{align-self:flex-end}
    .msg .bubble{padding:14px 20px;border-radius:var(--radius);font-size:14px;line-height:1.65;word-wrap:break-word}
    .msg.bot .bubble{
      background:var(--card);color:var(--text);
      border:1px solid var(--border);
      border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);
      border-bottom-right-radius:var(--radius);border-bottom-left-radius:4px;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
    }
    .msg.user .bubble{
      background:var(--primary);color:#fff;
      border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);
      border-bottom-left-radius:var(--radius);border-bottom-right-radius:4px;
      box-shadow:0 2px 8px rgba(0,40,80,.15);
    }
    .msg .bubble strong{color:var(--primary)}
    .msg.user .bubble strong{color:#aad4ff}
    .msg .bubble ul,.msg .bubble ol{margin:6px 0 4px 18px;font-size:13.2px}
    .msg .bubble li{margin-bottom:4px}
    .msg .bubble a{color:var(--accent);text-decoration:none}
    .msg .bubble a:hover{text-decoration:underline}

    /* ===== QUICK BUTTONS ===== */
    .quick-buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .quick-btn{
      background:#fff;color:var(--text);border:1.5px solid #c8d3de;
      border-radius:22px;padding:8px 18px;font-size:13px;cursor:pointer;
      transition:all .2s ease;font-family:inherit;white-space:nowrap;
      font-weight:500;
    }
    .quick-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(0,40,80,.15)}

    /* ===== INPUT BAR ===== */
    .chat-input{
      padding:18px 28px;border-top:1px solid var(--border);display:flex;gap:12px;
      background:var(--card);flex-shrink:0;
      border-radius:0 0 var(--radius-lg) var(--radius-lg);
    }
    .chat-input input{
      flex:1;border:1.5px solid var(--border);border-radius:26px;padding:13px 22px;
      font-size:14.5px;outline:none;font-family:inherit;transition:border-color .2s;
      background:#f8fafb;
    }
    .chat-input input:focus{border-color:var(--accent);background:#fff}
    .chat-input input::placeholder{color:#a0aab5}
    .chat-input button{
      width:48px;height:48px;border-radius:50%;border:none;
      background:var(--primary);
      color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;
      justify-content:center;transition:transform .15s,box-shadow .2s;flex-shrink:0;
    }
    .chat-input button:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(0,51,102,.3)}

    /* ===== TYPING INDICATOR ===== */
    .typing{display:flex;gap:5px;padding:8px 0}
    .typing span{width:8px;height:8px;background:#b0bec5;border-radius:50%;animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ===== STEP CARDS ===== */
    .step-card{
      background:#f0f5ff;border-left:3px solid var(--primary-light);
      border-radius:8px;padding:10px 14px;margin:6px 0;font-size:13.2px;
    }
    .step-card .step-num{font-weight:700;color:var(--primary);margin-right:4px}

    /* ===== FLOW DIAGRAM ===== */
    .flow-diagram{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin:10px 0;font-size:12.5px}
    .flow-node{
      background:#eef3fa;border:1px solid #b8cce8;border-radius:8px;
      padding:6px 12px;font-weight:600;color:var(--primary);white-space:nowrap;
    }
    .flow-node.green{background:#e8f5e9;border-color:#a5d6a7;color:var(--green)}
    .flow-node.orange{background:#fff3e0;border-color:#ffcc80;color:var(--orange)}
    .flow-node.red{background:#fce4ec;border-color:#ef9a9a;color:var(--red)}
    .flow-node.active-node{background:var(--primary);color:#fff;border-color:var(--primary)}
    .flow-arrow{font-size:16px;color:var(--text-light);flex-shrink:0}

    /* ===== CHANNEL BADGES ===== */
    .channel-badge{
      display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
      border-radius:12px;font-size:11.5px;font-weight:600;
    }
    .channel-badge.green{background:#e8f5e9;color:var(--green);border:1px solid #a5d6a7}
    .channel-badge.orange{background:#fff3e0;color:var(--orange);border:1px solid #ffcc80}
    .channel-badge.red{background:#fce4ec;color:var(--red);border:1px solid #ef9a9a}

    /* ===== TABLES ===== */
    .msg .bubble table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px;border-radius:8px;overflow:hidden}
    .msg .bubble table th{background:var(--primary);color:#fff;padding:7px 10px;text-align:left;font-weight:600}
    .msg .bubble table td{padding:6px 10px;border-bottom:1px solid var(--border)}
    .msg .bubble table tr:nth-child(even) td{background:#f5f8ff}
    .msg .bubble table tr:last-child td{border-bottom:none}

    /* ===== INFO BOX ===== */
    .info-box{
      background:#fffce6;border:1px solid #ffe082;border-radius:8px;
      padding:10px 14px;margin:8px 0;font-size:12.8px;
    }
    .info-box.blue{background:#e3f2fd;border-color:#90caf9}
    .info-box.green-box{background:#e8f5e9;border-color:#a5d6a7}
    .info-box.red-box{background:#fce4ec;border-color:#ef9a9a}

    /* ===== SECTION TITLE (in bubble) ===== */
    .section-title{
      font-size:15px;font-weight:700;color:var(--primary);margin-bottom:8px;
      display:flex;align-items:center;gap:8px;
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width:780px){
      .app{width:95%;height:95vh}
    }
    @media(max-width:600px){
      .app{width:100%;height:100vh;border-radius:0}
      .topbar{border-radius:0}
      .chat-input{border-radius:0;padding:12px 14px}
      .chat-messages{padding:16px 14px}
      .msg{max-width:92%}
      .topbar .subtitle{display:none}
    }
  </style>
</head>
<body>

<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="bot-avatar">🤖</div>
    <div class="title-group">
      <span class="title">ROW Application Assistant</span>
      <span class="subtitle">Ask me anything about the ROW Application</span>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off" />
      <button id="sendBtn" title="Send">&#10148;</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// KNOWLEDGE BASE – Comprehensive ROW Process Data
// ============================================================
const KB = [
  // ---- WELCOME / MAIN MENU ----
  {
    id:"welcome",
    keywords:["hello","hi","hey","help","start","menu","what can you do","assist","home","main menu","welcome"],
    answer:`<div class="section-title">👋 Welcome to the ROW Process Assistant</div>
I can help field users with the <strong>complete Right of Way (ROW)</strong> process. Here's what I cover:
<br><br>
<table>
<tr><th>Category</th><th>Topics</th></tr>
<tr><td>🏛️ Authority</td><td>Authority Creation, Rate Update & Approval</td></tr>
<tr><td>📝 Application</td><td>Creation, Processing Fee, Acknowledgement, Joint Survey</td></tr>
<tr><td>📄 Demand Note</td><td>New DN, Supplementary DN, Channels, Approval & Payment</td></tr>
<tr><td>👥 Roles</td><td>ROW Executive, SCO, State FC&A, State ROW Lead, Sponsor & more</td></tr>
<tr><td>🗺️ GIS</td><td>Span Search, Split, Merge, Authority Update on Map</td></tr>
</table>
<br>Choose a topic below or type your question!`,
    quickButtons:["Authority Creation","Rate Update","Create Application","Demand Note","DN Channels","Roles & Tasks","GIS Map","Glossary"]
  },

  // ---- PROCESS OVERVIEW ----
  {
    id:"overview",
    keywords:["overview","process","flow","lifecycle","steps","what is row","about","how does row work","end to end","complete flow","full process"],
    answer:`<div class="section-title">📋 ROW Application – End-to-End Process Flow</div>
The Right of Way process follows these major stages:
<br><br>
<div class="flow-diagram">
  <span class="flow-node active-node">Authority Creation</span><span class="flow-arrow">→</span>
  <span class="flow-node">Rate Update</span><span class="flow-arrow">→</span>
  <span class="flow-node">App Creation</span><span class="flow-arrow">→</span>
  <span class="flow-node">Processing Fee</span><span class="flow-arrow">→</span>
  <span class="flow-node">Acknowledgement</span><span class="flow-arrow">→</span>
  <span class="flow-node">Joint Survey</span><span class="flow-arrow">→</span>
  <span class="flow-node">Demand Note</span><span class="flow-arrow">→</span>
  <span class="flow-node">DN Approval</span><span class="flow-arrow">→</span>
  <span class="flow-node">DN Payment</span>
</div>
<br>
<strong>1. Authority Creation</strong> – Create/configure ROW authorities (NHAI, PWD, etc.)<br>
<strong>2. Rate Update</strong> – Configure methodology-wise per-meter rates → Approval by NHQ FC&A<br>
<strong>3. Application Creation</strong> – Draft application (DIT/NON-DIT) → Generate Application Number<br>
<strong>4. Processing Fee</strong> – Capture fee → L1 (SCO) → L2 (State FC&A) Approval<br>
<strong>5. YEXP Number</strong> – Auto or Manual YEXP from SAP<br>
<strong>6. Acknowledgement</strong> – Submit acknowledged application documents<br>
<strong>7. Joint Survey</strong> – Capture survey findings<br>
<strong>8. Demand Note</strong> – Create New or Supplementary DN (Full / Partial / No DN)<br>
<strong>9. DN Approval</strong> – Channel-based: 🟢 Green (3L) | 🟠 Orange (4L) | 🔴 Red (5L)<br>
<strong>10. DN Payment</strong> – Payment instrument creation, execution & permission documents<br>
<br>
<div class="info-box blue">💡 <strong>Systems Used:</strong> K2 P2B (Workflow) + GIS (Mapping) + SAP Finance & Control</div>`,
    quickButtons:["Authority Creation","Create Application","Demand Note","DN Channels","Roles & Tasks"]
  },

  // ---- AUTHORITY CREATION ----
  {
    id:"authority_creation",
    keywords:["authority creation","create authority","new authority","add authority","authority setup","authority type","primary","secondary","authority details","row authority creation","manage authority","save authority","nhai","pwd","authority category"],
    answer:`<div class="section-title">🏛️ ROW Authority Creation</div>
Authority creation sets up the governing bodies (like NHAI, PWD) under which ROW applications are filed.
<br><br>
<div class="step-card"><span class="step-num">Step 1:</span> <strong>Select Filters</strong> – Choose City, JC (Jio Circle), JP (Jio Point), and Authority Type (<strong>Primary</strong> or <strong>Secondary</strong>).</div>
<div class="step-card"><span class="step-num">Step 2:</span> <strong>Add ROW Authority Details</strong> – Fill in Authority Category (e.g., NHAI, PWD), Authority Name (e.g., CG NHAI), Authority Address.</div>
<div class="step-card"><span class="step-num">Step 3:</span> Set up <strong>Jio State Mapping</strong> – Map Circle & Maintenance Point (MP) Name.</div>
<div class="step-card"><span class="step-num">Step 4:</span> Click <strong>"Save Authority"</strong> → Confirm → ✅ <em>"Authority Saved Successfully."</em></div>
<br>
<div class="info-box blue">
<strong>Authority Types:</strong><br>
• <strong>Primary</strong> – Main authority for the region<br>
• <strong>Secondary</strong> – Additional/supporting authority
</div>
`,
    quickButtons:["Rate Update","Create Application","Roles & Tasks","Main Menu"]
  },

  // ---- RATE UPDATE ----
  {
    id:"rate_update",
    keywords:["rate","rate update","row rate","rate configuration","methodology mapping","authority methodology","rate parameters","fixed charges","recurring charges","variance","escalation","discount","rate approval","approve rate","rate config","per meter rate","construction methodology","rate for route"],
    answer:`<div class="section-title">💰 ROW Rate Update – Authority Methodology Mapping</div>
Rate Update configures per-meter rates for each authority based on construction methodology.
<br><br>
<strong>⚙️ Configuration Steps:</strong>
<div class="step-card"><span class="step-num">Step 1:</span> <strong>Select City & Construction Methodology</strong> – Choose the region and methodology (e.g., UG, HDD, CROSSING).</div>
<div class="step-card"><span class="step-num">Step 2:</span> <strong>Update Methodology-wise Per Meter Rate for Route</strong> – Configure rate parameters:</div>
<ul>
  <li><strong>Circle</strong> – Region (e.g., West Bengal)</li>
  <li><strong>Methodology</strong> – e.g., CROSSING, UG, HDD</li>
  <li><strong>Construction Type</strong> – e.g., CROSSING, HDD</li>
  <li><strong>Ownership</strong> – e.g., OWN</li>
  <li><strong>Fixed Charges per Crossing (₹)</strong> – e.g., 10.00</li>
  <li><strong>Fixed Charges Higher Variance (%)</strong> – e.g., 2.00</li>
  <li><strong>Fixed Charges Lower Variance (%)</strong> – e.g., -2.00</li>
  <li><strong>Recurring Charges (₹)</strong> – e.g., 5.00</li>
  <li><strong>Recurring Charges Escalation (%)</strong> – e.g., 1.00</li>
  <li><strong>Discount (%)</strong> – e.g., 0.00</li>
</ul>
<div class="step-card"><span class="step-num">Step 3:</span> <strong>Approve Rate</strong> – Submit for approval to NHQ FC&A.</div>
<br>
<strong>✅ Approval Flow:</strong>
<div class="flow-diagram">
  <span class="flow-node">State FC&A Lead<br><small>Configure Rates</small></span><span class="flow-arrow">→</span>
  <span class="flow-node active-node">NHQ FC&A<br><small>Approve Rates</small></span><span class="flow-arrow">→</span>
  <span class="flow-node green">✅ Approved</span>
</div>
<div class="info-box">💡 Status changes from <strong>Pending → Approved</strong> once NHQ FC&A approves the rate configuration.</div>`,
    quickButtons:["Authority Creation","Create Application","Processing Fee","Main Menu"]
  },

  // ---- APPLICATION CREATION ----
  {
    id:"app_creation",
    keywords:["create","new","generate","application","create row","create application","how to create","draft","initiate","dit","non dit","non-dit","application creation","scope released","generate application number","link","span segment","draft application"],
    answer:`<div class="section-title">📝 ROW Application Creation & Processing</div>
This is the core workflow for creating ROW applications. It covers the full lifecycle from scope release to DN creation trigger.
<br><br>
<strong>📌 Application Creation Steps:</strong>
<div class="step-card"><span class="step-num">Step 1:</span> <strong>Receive Notification</strong> – Scope Released for Construction notification triggers the process.</div>
<div class="step-card"><span class="step-num">Step 2:</span> <strong>Initiate Draft Application</strong> – Choose <strong>DIT</strong> or <strong>NON-DIT</strong> application type.</div>
<div class="step-card"><span class="step-num">Step 3:</span> <strong>Get Eligible Segments</strong> – Fetch Link/SPAN segments mapped to the Authority.</div>
<div class="step-card"><span class="step-num">Step 4:</span> <strong>Generate Draft Application Number</strong> – Select partial or total SPANs of the link.</div>
<div class="step-card"><span class="step-num">Step 5:</span> <strong>Generate Application Number</strong> – System checks if Application Processing Fee is required.</div>
<br>
<div class="info-box blue">
<strong>Application Types:</strong><br>
• <strong>DIT</strong> – Department of Information Technology governed applications<br>
• <strong>NON-DIT</strong> – Non-DIT applications (standard ROW)
</div>
<br>
<strong>📌 After Application Generation:</strong>
<div class="step-card"><span class="step-num">Step 6:</span> If processing fee applicable → <strong>Capture Processing Fee</strong> → Approval flow</div>
<div class="step-card"><span class="step-num">Step 7:</span> <strong>YEXP Number</strong> – Auto from SAP or Manual entry</div>
<div class="step-card"><span class="step-num">Step 8:</span> <strong>Submit Payment Doc Status</strong></div>
<div class="step-card"><span class="step-num">Step 9:</span> <strong>Verbal Permission</strong> – Update flag & upload documents (if available)</div>
<div class="step-card"><span class="step-num">Step 10:</span> <strong>Submit Application Acknowledgement</strong></div>
<div class="step-card"><span class="step-num">Step 11:</span> <strong>Submit Joint Survey Findings</strong></div>
<div class="step-card"><span class="step-num">Step 12:</span> <strong>Trigger DN Creation Workflow</strong></div>
<br>
<div class="flow-diagram">
  <span class="flow-node active-node">Scope Released</span><span class="flow-arrow">→</span>
  <span class="flow-node">Draft App</span><span class="flow-arrow">→</span>
  <span class="flow-node">Gen App No.</span><span class="flow-arrow">→</span>
  <span class="flow-node">Processing Fee</span><span class="flow-arrow">→</span>
  <span class="flow-node">YEXP</span><span class="flow-arrow">→</span>
  <span class="flow-node">Acknowledge</span><span class="flow-arrow">→</span>
  <span class="flow-node">Joint Survey</span><span class="flow-arrow">→</span>
  <span class="flow-node">Trigger DN</span>
</div>`,
    quickButtons:["Processing Fee","YEXP Number","Acknowledgement","Joint Survey","Demand Note","Roles & Tasks"]
  },

  // ---- PROCESSING FEE ----
  {
    id:"processing_fee",
    keywords:["processing fee","fee","payment","approval","l1","l2","sco","fc&a","fca","capture fee","application processing fee","approve fee","reject fee","rework fee","fee approval"],
    answer:`<div class="section-title">💳 Application Processing Fee & Approval</div>
When an application requires a processing fee, the following flow is triggered:
<br><br>
<div class="step-card"><span class="step-num">Step 1:</span> <strong>ROW Executive</strong> captures the application processing fee details.</div>
<div class="step-card"><span class="step-num">Step 2:</span> Fee goes for <strong>L1 Approval</strong> → reviewed by <strong>SCO</strong>.</div>
<div class="step-card"><span class="step-num">Step 3:</span> <strong>L1 Decision:</strong>
  <ul>
    <li>✅ <strong>Approved</strong> → Moves to L2</li>
    <li>❌ <strong>Rejected</strong> → Rework on Processing Fee (goes back to ROW Executive)</li>
  </ul>
</div>
<div class="step-card"><span class="step-num">Step 4:</span> <strong>L2 Approval</strong> → reviewed by <strong>State FC&A</strong>.</div>
<div class="step-card"><span class="step-num">Step 5:</span> <strong>L2 Decision:</strong>
  <ul>
    <li>✅ <strong>Approved</strong> → Approval notification sent to ROW Executive</li>
    <li>❌ <strong>Rejected</strong> → Rework on Processing Fee</li>
  </ul>
</div>
<br>
<strong>✅ Approval Flow:</strong>
<div class="flow-diagram">
  <span class="flow-node">ROW Executive<br><small>Capture Fee</small></span><span class="flow-arrow">→</span>
  <span class="flow-node">SCO<br><small>L1 Approval</small></span><span class="flow-arrow">→</span>
  <span class="flow-node">State FC&A<br><small>L2 Approval</small></span><span class="flow-arrow">→</span>
  <span class="flow-node green">✅ Approved</span>
</div>
<div class="flow-diagram" style="margin-top:4px">
  <span class="flow-arrow" style="visibility:hidden">→</span>
  <span class="flow-node red">❌ Rejected</span><span class="flow-arrow">→</span>
  <span class="flow-node">ROW Executive<br><small>Rework Fee</small></span>
</div>
`,
    quickButtons:["YEXP Number","Create Application","Demand Note","Main Menu"]
  },

  // ---- YEXP NUMBER ----
  {
    id:"yexp",
    keywords:["yexp","yexp number","sap","finance","auto yexp","manual yexp","generate yexp","enter yexp","financial system"],
    answer:`<div class="section-title">🔢 YEXP Number – SAP Finance Integration</div>
After L2 approval of processing fee, the YEXP number is handled:
<br><br>
<div class="step-card"><span class="step-num">Step 1:</span> <strong>Receive L2 Approval Notification</strong> – ROW Executive gets notified.</div>
<div class="step-card"><span class="step-num">Step 2:</span> System checks: <strong>Auto or Manual YEXP creation?</strong></div>
<br>
<div class="info-box blue">
<strong>Auto YEXP:</strong> If auto-generated, system fetches YEXP number directly from <strong>SAP Finance & Control</strong>.<br><br>
<strong>Manual YEXP:</strong> If manual, ROW Executive creates YEXP in SAP and then enters the number in K2.
</div>
<br>
<div class="step-card"><span class="step-num">Step 3:</span> <strong>Submit Application Payment Doc Status</strong> – After YEXP is captured.</div>
<br>

// ============================================================
// DOM REFERENCES
// ============================================================
const chatMessages = document.getElementById('chatMessages');
const userInput    = document.getElementById('userInput');
const sendBtn      = document.getElementById('sendBtn');

// ============================================================
// MESSAGE HELPERS
// ============================================================
function addMessage(html,sender,quickButtons){
  const wrapper=document.createElement('div');
  wrapper.className=`msg ${sender}`;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML=html;
  wrapper.appendChild(bubble);
  if(quickButtons&&quickButtons.length){
    const qDiv=document.createElement('div');
    qDiv.className='quick-buttons';
    quickButtons.forEach(label=>{
      const btn=document.createElement('button');
      btn.className='quick-btn';
      btn.textContent=label;
      btn.addEventListener('click',()=>handleQuickButton(label));
      qDiv.appendChild(btn);
    });
    wrapper.appendChild(qDiv);
  }
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop=chatMessages.scrollHeight;
}

function showTyping(){
  const w=document.createElement('div');
  w.className='msg bot';w.id='typingIndicator';
  w.innerHTML='<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chatMessages.appendChild(w);chatMessages.scrollTop=chatMessages.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typingIndicator');if(t)t.remove()}

// ============================================================
// MATCHING ENGINE (enhanced scoring)
// ============================================================
function findAnswer(input){
  const lower=input.toLowerCase().trim();
  let bestMatch=null,bestScore=0;

  for(const entry of KB){
    let score=0;
    for(const kw of entry.keywords){
      if(lower===kw){score+=kw.length+15}        // exact match bonus
      else if(lower.includes(kw)){
        score+=kw.length;
        // bonus for multi-word keyword matches
        if(kw.includes(' '))score+=5;
      }
      // partial word matching
      else{
        const words=kw.split(/\s+/);
        const inputWords=lower.split(/\s+/);
        let partialScore=0;
        for(const w of words){
          for(const iw of inputWords){
            if(iw.includes(w)||w.includes(iw)){
              partialScore+=Math.min(w.length,iw.length)*0.5;
            }
          }
        }
        score+=partialScore;
      }
    }
    if(score>bestScore){bestScore=score;bestMatch=entry}
  }

  if(bestMatch&&bestScore>2)return bestMatch;

  return{
    answer:`I'm not sure about that. Could you try asking in a different way? Here are some topics I can help with:`,
    quickButtons:["Create Application","Search Span","Split Span","Merge Application","Submit Application","Joint Survey","Processing Fee","Glossary","Main Menu"]
  };
}

// ============================================================
// HANDLE INPUT
// ============================================================
function handleUserMessage(text){
  if(!text.trim())return;
  addMessage(text,'user');
  userInput.value='';
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const result=findAnswer(text);
    addMessage(result.answer,'bot',result.quickButtons);
  },400+Math.random()*300);
}

function handleQuickButton(label){
  const map={
    "Main Menu":"hello",
    "Authority Creation":"authority creation how to create authority",
    "Rate Update":"row rate update authority methodology mapping",
    "Create Application":"how to create a new ROW application",
    "Processing Fee":"application processing fee approval",
    "Acknowledgement":"submit application acknowledgement",
    "Joint Survey":"how to capture joint survey details",
    "YEXP Number":"yexp number sap finance",
    "Demand Note":"demand note overview dn types",
    "New DN":"new demand note creation",
    "Supplementary DN":"supplementary demand note creation",
    "DN Channels":"dn channels green orange red approval flow",
    "DN Payment":"demand note payment execution",
    "DN Fee Details":"dn fee details fixed recurring charges",
    "Roles & Tasks":"roles and tasks complete mapping",
    "ROW Executive":"row executive tasks responsibilities",
    "Approver Roles":"approver roles who approves",
    "GIS Map":"gis map span management search split",
    "Glossary":"glossary abbreviations full form",
    "Troubleshooting":"troubleshooting error help",
    "Process Overview":"overview complete process flow lifecycle",
    "Rework":"rework rejected rejection",
    "Verbal Permission":"verbal permission flag documents",
    "NOC Document":"noc no objection certificate upload",
    "Search Span":"gis map span search",
    "Split Span":"gis map span split",
    "Merge Application":"gis merge application",
    "Submit Application":"submit application acknowledgement",
    "Create Demand Note":"how to create demand note step by step"
  };
  const query=map[label]||label;
  handleUserMessage(query);
}

sendBtn.addEventListener('click',()=>handleUserMessage(userInput.value));
